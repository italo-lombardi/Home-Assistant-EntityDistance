[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["custom_components.entity_distance"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
