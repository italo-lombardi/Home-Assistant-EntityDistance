  <!-- Right pin -->
  <g transform="translate(266, 140)">
    <path d="M56 0C25.1 0 0 25.1 0 56c0 39.2 56 104 56 104S112 95.2 112 56C112 25.1 86.9 0 56 0z" fill="#41BDF5"/>
